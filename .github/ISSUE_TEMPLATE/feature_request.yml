name: 기능 제안
description: tm-mode 에 새 기능이나 개선을 제안합니다.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 / 불편
      description: 어떤 상황에서 무엇이 불편한가요? 실제 겪은 상황 중심으로.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안
      description: 어떻게 바뀌면 좋을지. 구체적인 동작·CLI·스킬 흐름이면 더 좋습니다.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 (선택)
      description: 지금은 어떻게 우회하고 있는지, 고려한 다른 방법이 있는지.
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: 환경 (선택)
      description: 에이전트(Claude Code/Codex), OS 등 제안과 관련 있으면.
      placeholder: "예: Codex / Ubuntu 24.04"
    validations:
      required: false

  - type: checkboxes
    id: constraints
    attributes:
      label: 제약 확인
      options:
        - label: Python 3.9+ 표준 라이브러리만으로 구현 가능한 제안입니다 (stdlib-only).
          required: false
