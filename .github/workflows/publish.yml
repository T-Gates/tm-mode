# 릴리스 발행 — v* 태그 push 시 build → PyPI (Trusted Publishing/OIDC, 시크릿 불필요).
# 선행 1회(사람): PyPI 프로젝트 tm-mode 에 Trusted Publisher 등록
#   (owner T-Gates / repo tm-mode / workflow publish.yml / environment pypi).
# 등록 전엔 publish 단계가 실패할 뿐 레포에 무해하다.
name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify wheel contains LICENSE + version matches tag
        run: |
          python -m pip install --upgrade packaging
          python - <<'PY'
          import glob, os, zipfile
          from packaging.utils import parse_wheel_filename
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          assert any(n.endswith("licenses/LICENSE") or n.endswith("LICENSE")
                     for n in names), f"wheel 에 LICENSE 없음: {names}"
          # PEP 440 전체(rc/post/dev 포함) 정합 — 수기 regex 는 프리릴리스에서 오탐(codex P2)
          _, ver, _, _ = parse_wheel_filename(os.path.basename(whl))
          tag = os.environ.get("GITHUB_REF_NAME", "")
          assert tag == f"v{ver}", \
              f"버전({ver}) ≠ 태그({tag}) — __init__.__version__ 갱신 누락"
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write   # npm Trusted Publishing (OIDC) — 시크릿 불필요
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'          # OIDC publish 요건: npm 11.5.1+ / Node 22.14+
          registry-url: 'https://registry.npmjs.org'
      - name: Verify npm version matches tag
        run: |
          cd npm
          node -e "
            const v = require('./package.json').version;
            const tag = process.env.GITHUB_REF_NAME;
            if ('v' + v !== tag) { console.error('npm 버전(' + v + ') ≠ 태그(' + tag + ')'); process.exit(1); }
          "
      - name: Publish to npm (OIDC)
        run: cd npm && npm publish
